<input> – ინფორმაციის შესაყვანად
<label> – input-ის სახელის დასაწერად
<textarea> – დიდი ტექსტის დასაწერად
<select> – ჩამოსაშლელი სია
<option> – select-ში არსებული არჩევანი
<button> – ღილაკი-->

<!--ატრიბუტები: action – სად იგზავნება ფორმის ინფორმაცია
method – როგორ იგზავნება ინფორმაცია (GET ან POST)
type – input-ის ტიპი (text, password, email და სხვ.)
name – input-ის სახელი
value – მნიშვნელობა
placeholder – დამხმარე ტექსტი input-ში
required – ნიშნავს რომ ველი აუცილებლად შესავსებია-->

<!--name ატრიბუტი გამოიყენება იმისთვის რომ input-ს ჰქონდეს სახელი.
როდესაც მომხმარებელი ავსებს ფორმას და აგზავნის მას სერვერი იღებს მონაცემებს name=value ფორმატში.-->
